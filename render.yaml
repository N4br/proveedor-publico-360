services:
  - type: web
    name: proveedor-publico-360-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build -w apps/api
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_DOCUMENTS_BUCKET
        value: company-documents
      - key: SUPABASE_STORAGE_TENDER_BUCKET
        value: tender-documents
      - key: MERCADO_PUBLICO_TICKET
        sync: false
      - key: MERCADO_PUBLICO_BASE_URL
        value: https://api.mercadopublico.cl/servicios/v1/publico
      - key: MERCADO_PUBLICO_ALLOW_HEADLESS_ATTACHMENTS
        value: false
      - key: ATTACHMENTS_DOWNLOAD_DIR
        value: attachments-test
      - key: AI_MODE
        value: mock
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
